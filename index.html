<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>online-forum</title>
    <script type="module" src="/src/main.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <a href="#" class="logo-a">
          <img src="img/logo-gath.svg" class="logo-img" alt="" />
        </a>
        <nav>
          <ul class="menu__ul">
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">Blog</a>
            <a href="#">Contact</a>
            <a href="#">About Us</a>
          </ul>
        </nav>
      </header>
      <main>
        <section class="hero">
          <div class="hero__top">
            <h1 class="hero__title">
              Build your best community starting from here.
            </h1>
            <p class="hero__text">
              Meet and communicate with the best people to run projects, events
              or other activities in a more effective and fun way
            </p>
            <div class="hero__buttons">
              <a href="#" class="btn">Get Started</a>
              <a href="#" class="btn-arrow"
                >Learn More <img src="img/arrow.svg" alt=""
              /></a>
            </div>
          </div>
          <div class="hero__features">
            <div class="hero__feature">
              <img src="img/icon-chat.png" alt="" class="hero__feature-logo" />
              <p class="hero__feature-desc">Build Community</p>
            </div>
            <div class="hero__feature">
              <img
                src="img/icon-calendar.svg"
                alt=""
                class="hero__feature-logo"
              />
              <p class="hero__feature-desc">Share Events</p>
            </div>
            <div class="hero__feature">
              <img src="img/icon-info.svg" alt="" class="hero__feature-logo" />
              <p class="hero__feature-desc">Get Information</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <figure class="bg__fig">
      <img src="img/hero.png" class="bg__img" alt="" />
    </figure>
  </body>
</html>
